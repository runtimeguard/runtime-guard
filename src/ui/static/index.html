<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Runtime Guard Control Plane</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Policy Control Plane</h1>
      <p id="meta"></p>
      <div id="legend" class="legend"></div>
    </header>
    <main>
      <aside id="tabs"></aside>
      <section>
        <div class="toolbar">
          <input id="search" placeholder="Filter commands..." />
        </div>
        <div class="command header-row">
          <div>Command</div>
          <div>Allowed</div>
          <div>Simulation</div>
          <div>Requires Approval</div>
          <div>Blocked</div>
          <div>Retry</div>
          <div>Budget Ops</div>
          <div>Budget Paths</div>
          <div>Budget Bytes</div>
        </div>
        <div id="commands"></div>
        <h3>Advanced JSON</h3>
        <textarea id="json" rows="18"></textarea>
        <div class="actions">
          <button id="reload">Reload</button>
          <button id="validate">Validate</button>
          <button id="apply">Apply</button>
        </div>
        <pre id="result"></pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
